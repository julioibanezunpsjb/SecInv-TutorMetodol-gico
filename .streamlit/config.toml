[theme]
primaryColor = "#1E3A5F"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
port = 8501
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Para cambiar entre modo claro/oscuro, el usuario puede seleccionar en:
# Menu (☰) → Settings → Theme
